services:
  - type: web
    name: rareform
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build && cd server && npm ci && npm run build && node dist/scripts/migrate.js
    startCommand: node server/dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rareform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: rareform-db
    databaseName: rareform
    user: rareform
    plan: free
